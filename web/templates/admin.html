<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Music Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: block;
            overflow: auto;
            height: auto;
            grid-template-columns: none;
            grid-template-rows: none;
            padding: 0;
        }
        .admin-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px;
            color: #fff;
        }
        .admin-card {
            background: rgba(18, 18, 18, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 18px;
        }
        .admin-card h2 {
            margin-bottom: 12px;
            font-size: 18px;
        }
        .admin-card-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .admin-card-title-row h2 {
            margin: 0;
        }
        .admin-view-toggle {
            display: flex;
            background: var(--spotify-gray);
            border-radius: 6px;
            padding: 4px;
            gap: 4px;
        }
        .admin-view-toggle button {
            background: transparent;
            border: none;
            color: var(--spotify-light-gray);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
        }
        .admin-view-toggle button.active {
            background: #333;
            color: var(--spotify-white);
        }
        .admin-track-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .admin-track-meta {
            font-size: 12px;
            opacity: .75;
            margin-top: 6px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .admin-track-meta a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
        }
        .admin-track-meta a:hover {
            text-decoration: underline;
            color: #fff;
        }
        .admin-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        table.admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        table.admin-table th,
        table.admin-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
            vertical-align: top;
        }
        table.admin-table th {
            color: rgba(255,255,255,0.7);
            font-weight: 700;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .admin-btn {
            background: var(--spotify-green);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
        }
        .admin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <div class="admin-card">
            <div class="admin-row">
                <h1 style="margin:0; font-size:22px;">Admin Panel</h1>
                <button class="admin-btn" id="refreshBtn">Refresh</button>
            </div>
            <div id="adminAuthMsg" style="margin-top:12px; color: rgba(255,255,255,0.8);"></div>
        </div>

        <div class="admin-card">
            <div class="admin-card-title-row">
                <h2>Users</h2>
            </div>
            <div id="usersList"></div>
        </div>

        <div class="admin-card">
            <div class="admin-card-title-row">
                <h2>Tracks</h2>
                <div class="admin-track-actions">
                    <div class="admin-view-toggle" id="tracksViewToggle" title="View">
                        <button type="button" class="active" data-view="grid">Grid</button>
                        <button type="button" data-view="list">List</button>
                    </div>
                </div>
            </div>
            <div id="tracksList"></div>
        </div>
    </div>

    <script>
        const usersList = document.getElementById('usersList');
        const tracksList = document.getElementById('tracksList');
        const refreshBtn = document.getElementById('refreshBtn');
        const adminAuthMsg = document.getElementById('adminAuthMsg');

        function showMsg(text) {
            adminAuthMsg.textContent = text || '';
        }

        function renderUsers(users) {
            if (!users || users.length === 0) {
                usersList.innerHTML = '<div style="opacity:0.8;">No users</div>';
                return;
            }
            const rows = users.map(u => `
                <tr>
                    <td class="mono">${u.id}</td>
                    <td>${u.username || ''}</td>
                    <td>${u.first_name || ''}</td>
                    <td>${u.last_name || ''}</td>
                    <td>${u.total_downloads}</td>
                    <td>${u.last_active || ''}</td>
                    <td>${u.is_admin ? 'yes' : 'no'}</td>
                </tr>
            `).join('');

            usersList.innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Username</th>
                            <th>First</th>
                            <th>Last</th>
                            <th>Total downloads</th>
                            <th>Last active</th>
                            <th>Admin</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderTracks(tracks) {
            if (!tracks || tracks.length === 0) {
                tracksList.innerHTML = '<div style="opacity:0.8;">No tracks</div>';
                return;
            }
            const cards = tracks.map(t => {
                const safeId = String(t.id || '').replace(/"/g, '&quot;');
                const safeName = String(t.name || '').replace(/"/g, '&quot;');
                const safeArtist = String(t.artist || '').replace(/"/g, '&quot;');

                const img = t.image
                    ? `<img loading="lazy" decoding="async" src="${t.image}" alt="${safeName}" />`
                    : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;

                const url = t.spotify_url ? String(t.spotify_url) : '';
                const urlHtml = url ? `<a href="${url}" target="_blank" rel="noreferrer">Spotify</a>` : '';

                return `
                    <div class="track-card" data-track-id="${safeId}">
                        <div class="track-image">${img}</div>
                        <div class="track-info">
                            <div class="track-name" title="${safeName}">${t.name || ''}</div>
                            <div class="track-artist" title="${safeArtist}">${t.artist || ''}</div>
                            <div class="admin-track-meta">
                                <span title="Downloads">⬇ ${t.download_count ?? 0}</span>
                                <span class="mono" title="Track ID">${t.id || ''}</span>
                                ${urlHtml ? `<span>${urlHtml}</span>` : ``}
                            </div>
                        </div>
                        <div class="track-actions">
                            <button class="action-btn secondary" title="Delete" onclick="deleteTrack('${safeId}')">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            tracksList.innerHTML = `<div class="results-grid" id="adminTracksGrid">${cards}</div>`;
        }

        async function apiGet(path) {
            const res = await fetch(path, {
                credentials: 'same-origin'
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || 'Request failed');
            }
            return data;
        }

        async function loadAdmin() {
            try {
                refreshBtn.disabled = true;
                showMsg('Loading...');
                usersList.innerHTML = 'Loading...';
                tracksList.innerHTML = 'Loading...';

                const usersData = await apiGet('/admin/api/users?limit=50&offset=0');
                const tracksData = await apiGet('/admin/api/tracks?limit=50');

                renderUsers(usersData.users || []);
                renderTracks(tracksData.tracks || []);

                showMsg('');
            } catch (e) {
                console.error(e);
                showMsg(e.message || 'Admin load failed');
            } finally {
                refreshBtn.disabled = false;
            }
        }

        async function deleteTrack(trackId) {
            if (!trackId) return;
            const ok = confirm(`Delete track from database?\n\n${trackId}`);
            if (!ok) return;

            try {
                showMsg('Deleting...');
                const res = await fetch('/admin/api/tracks/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ track_id: trackId })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Delete failed');
                }
                showMsg('');
                await loadAdmin();
            } catch (e) {
                console.error(e);
                showMsg(e.message || 'Delete failed');
            }
        }

        loadAdmin();
        refreshBtn.addEventListener('click', loadAdmin);

        // View toggle (grid/list) для треков как в Discover
        const tracksViewToggle = document.getElementById('tracksViewToggle');
        tracksViewToggle?.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-view]');
            if (!btn) return;
            const view = btn.dataset.view;
            tracksViewToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const grid = document.getElementById('adminTracksGrid');
            if (!grid) return;
            if (view === 'list') grid.classList.add('list-view');
            else grid.classList.remove('list-view');
        });
    </script>
</body>
</html>
