<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Music Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: block;
            overflow: auto;
            height: auto;
            grid-template-columns: none;
            grid-template-rows: none;
            padding: 0;
        }
        .admin-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px;
            color: #fff;
        }
        .admin-card {
            background: rgba(18, 18, 18, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 18px;
        }
        .admin-card h2 {
            margin-bottom: 12px;
            font-size: 18px;
        }
        .admin-card-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .admin-card-title-row h2 {
            margin: 0;
        }
        .admin-view-toggle {
            display: flex;
            background: var(--spotify-gray);
            border-radius: 6px;
            padding: 4px;
            gap: 4px;
        }
        .admin-view-toggle button {
            background: transparent;
            border: none;
            color: var(--spotify-light-gray);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
        }
        .admin-view-toggle button.active {
            background: #333;
            color: var(--spotify-white);
        }
        .admin-track-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .admin-track-meta {
            font-size: 12px;
            opacity: .75;
            margin-top: 6px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .admin-track-meta a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
        }
        .admin-track-meta a:hover {
            text-decoration: underline;
            color: #fff;
        }
        .admin-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        table.admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        table.admin-table th,
        table.admin-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
            vertical-align: top;
        }
        table.admin-table th {
            color: rgba(255,255,255,0.7);
            font-weight: 700;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .admin-btn {
            background: var(--spotify-green);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
        }
        .admin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <div class="admin-card">
            <div class="admin-row">
                <h1 style="margin:0; font-size:22px;">Admin Panel</h1>
                <button class="admin-btn" id="refreshBtn">Refresh</button>
            </div>
            <div id="adminAuthMsg" style="margin-top:12px; color: rgba(255,255,255,0.8);"></div>
        </div>

        <div class="admin-card">
            <div class="admin-card-title-row">
                <h2>Discover tracks</h2>
            </div>
            <div id="tracksList"></div>
        </div>

        <div class="admin-card">
            <div class="admin-card-title-row">
                <h2>Playlist control</h2>
            </div>
            <div id="playlistList"></div>
        </div>
    </div>

    <script>
        const tracksList = document.getElementById('tracksList');
        const playlistList = document.getElementById('playlistList');
        const refreshBtn = document.getElementById('refreshBtn');
        const adminAuthMsg = document.getElementById('adminAuthMsg');

        function showMsg(text) {
            adminAuthMsg.textContent = text || '';
        }

        function renderTracks(tracks) {
            if (!tracks || tracks.length === 0) {
                tracksList.innerHTML = '<div style="opacity:0.8;">No tracks</div>';
                return;
            }
            const cards = tracks.map(t => {
                const safeId = String(t.id || '').replace(/"/g, '&quot;');
                const safeName = String(t.name || '').replace(/"/g, '&quot;');
                const safeArtist = String(t.artist || '').replace(/"/g, '&quot;');

                const img = t.image
                    ? `<img loading="lazy" decoding="async" src="${t.image}" alt="${safeName}" />`
                    : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;

                const url = t.spotify_url ? String(t.spotify_url) : '';
                const urlHtml = url ? `<a href="${url}" target="_blank" rel="noreferrer">Spotify</a>` : '';

                return `
                    <div class="track-card" data-track-id="${safeId}">
                        <div class="track-image">${img}</div>
                        <div class="track-info">
                            <div class="track-name" title="${safeName}">${t.name || ''}</div>
                            <div class="track-artist" title="${safeArtist}">${t.artist || ''}</div>
                            <div class="admin-track-meta">
                                <span class="mono" title="Track ID">${t.id || ''}</span>
                                ${urlHtml ? `<span>${urlHtml}</span>` : ``}
                            </div>
                        </div>
                        <div class="track-actions">
                            <button class="action-btn secondary" title="Delete" onclick="deleteTrack('${safeId}')">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            tracksList.innerHTML = `<div class="results-grid" id="adminTracksGrid">${cards}</div>`;
        }

        function renderPlaylists(playlists) {
            if (!playlists || playlists.length === 0) {
                playlistList.innerHTML = '<div style="opacity:0.8;">No playlists</div>';
                return;
            }
            const rows = playlists.map(pl => {
                const sid = String(pl.spotify_id || '').replace(/"/g, '&quot;');
                const safeName = String(pl.name || '').replace(/"/g, '&quot;');
                const safeOwner = String(pl.owner || '').replace(/"/g, '&quot;');
                const total = pl.total_tracks ?? '-';
                const cached = pl.cached_tracks_count ?? 0;
                const status = pl.is_cached_public ? 'cached' : 'not cached';
                const updated = pl.updated_at || '';
                return `
                    <tr>
                        <td class="mono">${sid}</td>
                        <td>${safeName}</td>
                        <td>${safeOwner}</td>
                        <td>${total}</td>
                        <td>${cached}</td>
                        <td>${status}</td>
                        <td class="mono">${updated}</td>
                        <td>
                            <button class="admin-btn" style="padding:6px 10px; margin-right:6px;" onclick="cachePlaylistNow('${sid}')">Cache now</button>
                            <button class="admin-btn" style="padding:6px 10px; background:#b92d2d;" onclick="deletePublicPlaylist('${sid}')">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');

            playlistList.innerHTML = `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Spotify ID</th>
                            <th>Name</th>
                            <th>Owner</th>
                            <th>Total</th>
                            <th>Cached</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function apiGet(path) {
            const res = await fetch(path, {
                credentials: 'same-origin'
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.error || 'Request failed');
            }
            return data;
        }

        async function loadAdmin() {
            try {
                refreshBtn.disabled = true;
                showMsg('Loading...');
                tracksList.innerHTML = 'Loading...';

                const tracksData = await apiGet('/api/library?limit=500');
                const playlistsData = await apiGet('/admin/api/playlists/public?limit=200');

                renderTracks(tracksData.tracks || []);
                renderPlaylists(playlistsData.playlists || []);

                showMsg('');
            } catch (e) {
                console.error(e);
                showMsg(e.message || 'Admin load failed');
            } finally {
                refreshBtn.disabled = false;
            }
        }

        async function deleteTrack(trackId) {
            if (!trackId) return;
            const ok = confirm(`Delete track from database?\n\n${trackId}`);
            if (!ok) return;

            try {
                showMsg('Deleting...');
                const res = await fetch('/admin/api/tracks/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ track_id: trackId })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Delete failed');
                }
                showMsg('');
                await loadAdmin();
            } catch (e) {
                console.error(e);
                showMsg(e.message || 'Delete failed');
            }
        }

        async function deletePublicPlaylist(spotifyId) {
            if (!spotifyId) return;
            const ok = confirm(`Delete public playlist?\n\n${spotifyId}`);
            if (!ok) return;
            try {
                showMsg('Deleting playlist...');
                const res = await fetch('/admin/api/playlists/public/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ spotify_id: spotifyId })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Delete failed');
                await loadAdmin();
                showMsg('');
            } catch (e) {
                showMsg(e.message || 'Delete failed');
            }
        }

        async function cachePlaylistNow(spotifyId) {
            if (!spotifyId) return;
            try {
                showMsg('Starting cache job...');
                const res = await fetch('/admin/api/playlists/public/cache', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ spotify_id: spotifyId, limit: 100 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Cache start failed');
                showMsg(`Cache job started: ${data.job_id}`);
            } catch (e) {
                showMsg(e.message || 'Cache start failed');
            }
        }

        loadAdmin();
        refreshBtn.addEventListener('click', loadAdmin);
    </script>
</body>
</html>
